<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso ao Sistema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f4f0;
      --card: #ffffff;
      --border: #e0ddd6;
      --text: #1a1a18;
      --muted: #8a8880;
      --accent: #c0392b;
      --accent-light: #fdf0ef;
      --input-bg: #fafaf8;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: var(--shadow);
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo svg { width: 20px; height: 20px; fill: #fff; }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 400;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      padding: 10px 13px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
    }

    input::placeholder { color: #c4c2bc; }

    button {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 11px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    button:hover { opacity: 0.88; }

    #result {
      margin-top: 16px;
      padding: 10px 13px;
      border-radius: 7px;
      font-size: 13px;
      display: none;
    }

    #result.success { background: #edf7ed; color: #2e7d32; display: block; }
    #result.error   { background: var(--accent-light); color: var(--accent); display: block; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--border);
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
    }

    .footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/>
        </svg>
      </div>

      <h1>Entrar na conta</h1>
      <p class="subtitle">Acesse com seu usuário e senha</p>

      <form id="loginForm">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="Digite seu usuário" autocomplete="off">

        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha">

        <button type="submit">Entrar</button>
      </form>

      <div id="result"></div>

    </div>

    <div class="footer">
      <a href="/debug/hashes" target="_blank">debug</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const result = document.getElementById('result');

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          result.className = 'success';
          result.innerHTML = `Login realizado com sucesso — ${data.user.role}`;
        } else {
          result.className = 'error';
          result.innerHTML = data.message;
        }
      } catch {
        result.className = 'error';
        result.innerHTML = 'Erro de conexão';
      }
    });
  </script>
</body>
</html>
